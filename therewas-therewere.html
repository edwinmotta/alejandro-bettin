<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English for IT: Incident Reporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div id="app" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-slate-900 p-6 text-white">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Lesson 9: IT Incident Reporting</span>
                <div class="flex gap-2">
                    <button onclick="resetGame()" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-700 flex items-center gap-1 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset
                    </button>
                    <span id="score-badge" class="text-xs font-mono bg-slate-800 px-3 py-1 rounded border border-slate-700 text-blue-400">Score: 0</span>
                </div>
            </div>
            <h1 id="stage-title" class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="brain" class="text-blue-400"></i>
                Stage 1: Match the Incidents
            </h1>
            <p id="stage-desc" class="text-slate-400 text-sm mt-1">Match the direct action with its formal report using "There was/were".</p>
        </div>

        <!-- Progress Bar -->
        <div class="h-1.5 w-full bg-slate-100">
            <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <div id="game-container" class="p-6 md:p-10 fade-in">
            <!-- Questions injected here -->
        </div>

        <!-- Footer / Feedback -->
        <div id="feedback-container" class="hidden px-6 py-4 border-t border-slate-100 bg-slate-50">
            <!-- Feedback content -->
        </div>
    </div>

    <script>
        // --- GAME DATA ---
        const matchingData = [
            { cause: "The server crashed.", effect: "There was a server crash.", explanation: "We use 'There was' because 'crash' acts here as a singular noun describing the event." },
            { cause: "The system failed.", effect: "There was a system failure.", explanation: "We convert the verb 'failed' to the noun 'failure'. 'There was' indicates the existence of that failure." },
            { cause: "The database stopped responding.", effect: "There was a database outage.", explanation: "An 'outage' is a service interruption. It's a very professional way to report crashes in IT." },
            { cause: "The application froze.", effect: "There was an application freeze.", explanation: "Here 'freeze' acts as a noun. 'There was' is perfect for describing the state the app ended up in." },
            { cause: "The network went down.", effect: "There was a network outage.", explanation: "Even if the verb is 'went down', the formal report prefers 'There was an outage'." },
            { cause: "The API returned errors.", effect: "There were API errors.", explanation: "Attention! We use 'There were' because 'errors' is plural. Distinguishing this is fundamental." },
            { cause: "The service slowed down.", effect: "There was a slowdown in the service.", explanation: "We transform the phrasal verb 'slowed down' into the noun 'slowdown'." },
            { cause: "The server overloaded.", effect: "There was a server overload.", explanation: "'Overload' describes the state of congestion. 'There was' introduces the problem." },
            { cause: "The deployment failed.", effect: "There was a deployment failure.", explanation: "Again, we move from the action (failed) to the fact (failure)." },
            { cause: "The logs disappeared.", effect: "There was a loss of logs.", explanation: "Instead of saying they disappeared, we report the 'loss' of logs." }
        ];

        const writingData = [
            { q: "The system rebooted unexpectedly.", valid: ["there was an unexpected reboot", "there was a reboot", "there was an unexpected system reboot"], explanation: "Correct! 'There was a reboot' captures the essence of the event formally." },
            { q: "The backup failed.", valid: ["there was a backup failure", "there was a failure in the backup"], explanation: "Converting 'failed' to 'failure' is the standard way to report this incident in IT." },
            { q: "The users reported issues.", valid: ["there were user complaints", "there were user reports", "there were issues reported by users", "there were user issues"], explanation: "Since 'issues' or 'complaints' are plural, using 'There were' is mandatory." },
            { q: "The connection dropped.", valid: ["there was a connection drop", "there was a dropped connection", "there was a connection loss"], explanation: "We report the connection drop event as a noun-based fact." },
            { q: "The platform became unstable.", valid: ["there was instability in the platform", "there was platform instability"], explanation: "We transition from the adjective 'unstable' to the abstract noun 'instability'." },
            { q: "The authentication service broke.", valid: ["there was an authentication failure", "there was an auth failure"], explanation: "In IT, when something 'breaks', we usually report it as a 'failure'." },
            { q: "The data got corrupted.", valid: ["there was data corruption", "there was corruption in the data"], explanation: "'Corruption' is an uncountable noun in this context, hence we use 'There was'." },
            { q: "The monitoring system didn’t alert us.", valid: ["there was a lack of alerts", "there was no alert", "there was a monitoring failure"], explanation: "A lack of something is commonly reported as 'There was a lack of...'." },
            { q: "The engineers made mistakes.", valid: ["there were human errors", "there were mistakes by engineers"], explanation: "We use 'There were' for pluralizing the mistakes made (errors)." },
            { q: "The system couldn’t scale.", valid: ["there was a scalability issue", "there was a scaling problem"], explanation: "The inability to scale is often translated as a 'scalability issue'." }
        ];

        // --- APP STATE ---
        let currentStage = 1;
        let currentIndex = 0;
        let score = 0;
        let hasAnswered = false;
        let attempts = 0;
        const MAX_ATTEMPTS = 3;

        // --- CORE FUNCTIONS ---
        function initStage() {
            hasAnswered = false;
            attempts = 0;
            const feedbackContainer = document.getElementById('feedback-container');
            feedbackContainer.classList.add('hidden');
            
            if (currentStage === 1) {
                renderMatching();
            } else if (currentStage === 2) {
                renderWriting();
            } else {
                renderFinal();
            }
            updateProgress();
            lucide.createIcons();
        }

        function resetGame() {
            currentStage = 1;
            currentIndex = 0;
            score = 0;
            hasAnswered = false;
            attempts = 0;
            document.getElementById('score-badge').innerText = `Score: 0`;
            document.getElementById('stage-title').innerHTML = `<i data-lucide="brain" class="text-blue-400"></i> Stage 1: Match the Incidents`;
            document.getElementById('stage-desc').innerText = 'Match the direct action with its formal report using "There was/were".';
            initStage();
        }

        function renderMatching() {
            const data = matchingData[currentIndex];
            const options = [...matchingData].map(d => d.effect).sort(() => Math.random() - 0.5);
            
            document.getElementById('game-container').innerHTML = `
                <div class="text-center mb-8">
                    <span class="text-blue-600 font-semibold bg-blue-50 px-3 py-1 rounded-full text-sm uppercase">Matching Task</span>
                    <h2 class="text-3xl font-bold mt-4 text-slate-900">"${data.cause}"</h2>
                    <p class="text-slate-500 mt-2 text-lg">Select the correct formal report:</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    ${options.map(opt => `
                        <button onclick="checkMatch('${opt.replace(/'/g, "\\'")}')" 
                                class="option-btn p-4 text-left border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-slate-700 bg-white">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderWriting() {
            const data = writingData[currentIndex];
            document.getElementById('stage-title').innerHTML = `<i data-lucide="edit-3" class="text-green-400"></i> Stage 2: Active Production`;
            document.getElementById('stage-desc').innerText = "Convert the action into a formal report. You have 3 attempts.";

            document.getElementById('game-container').innerHTML = `
                <div class="text-center mb-8">
                    <span class="text-green-600 font-semibold bg-green-50 px-3 py-1 rounded-full text-sm uppercase">Production Task</span>
                    <h2 class="text-3xl font-bold mt-4 text-slate-900">"${data.q}"</h2>
                    <p id="writing-prompt" class="text-slate-500 mt-2">Type your report below:</p>
                </div>
                <div class="max-w-md mx-auto">
                    <div class="relative">
                        <input type="text" id="user-input" placeholder="e.g. There was a..." 
                               class="w-full p-4 pr-12 border-2 border-slate-200 rounded-xl focus:border-green-500 focus:outline-none text-lg transition-colors"
                               onkeypress="if(event.key === 'Enter') checkWrite()">
                        <button id="send-btn" onclick="checkWrite()" class="absolute right-2 top-2 bottom-2 bg-green-600 text-white px-4 rounded-lg hover:bg-green-700 transition-colors">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <p id="attempt-counter" class="text-center text-sm text-slate-400 mt-4">Attempts: 0 / 3</p>
                </div>
            `;
            document.getElementById('user-input').focus();
        }

        function checkMatch(selected) {
            if (hasAnswered) return;
            hasAnswered = true;
            const correct = matchingData[currentIndex].effect;
            const isCorrect = selected === correct;
            showFeedback(isCorrect, matchingData[currentIndex].explanation);
        }

        function checkWrite() {
            if (hasAnswered) return;
            const inputField = document.getElementById('user-input');
            const input = inputField.value.toLowerCase().trim();
            if (!input) return;

            attempts++;
            document.getElementById('attempt-counter').innerText = `Attempts: ${attempts} / 3`;

            const validAnswers = writingData[currentIndex].valid;
            const isCorrect = validAnswers.some(ans => {
                const keywords = ans.split(' ').filter(w => w.length > 3);
                return (input.includes('there was') || input.includes('there were')) && 
                       keywords.every(kw => input.includes(kw));
            });

            if (isCorrect) {
                hasAnswered = true;
                showFeedback(true, writingData[currentIndex].explanation);
            } else {
                if (attempts < MAX_ATTEMPTS) {
                    // Visual shake / error feedback
                    inputField.classList.add('border-red-500');
                    inputField.value = "";
                    const prompt = document.getElementById('writing-prompt');
                    prompt.innerText = "Incorrect. Try again!";
                    prompt.classList.add('text-red-500', 'font-bold');
                    setTimeout(() => {
                        inputField.classList.remove('border-red-500');
                        prompt.classList.remove('text-red-500', 'font-bold');
                        prompt.innerText = "Type your report below:";
                    }, 1000);
                } else {
                    hasAnswered = true;
                    const correctAns = writingData[currentIndex].valid[0];
                    showFeedback(false, `Maximum attempts reached. The correct answer was: "${correctAns}". ${writingData[currentIndex].explanation}`);
                }
            }
        }

        function showFeedback(isCorrect, message) {
            if (isCorrect) score += 10;
            document.getElementById('score-badge').innerText = `Score: ${score}`;

            const container = document.getElementById('feedback-container');
            container.classList.remove('hidden');
            
            // Disable input
            const input = document.getElementById('user-input');
            if(input) input.disabled = true;
            const btn = document.getElementById('send-btn');
            if(btn) btn.disabled = true;

            container.innerHTML = `
                <div class="flex items-start gap-4 fade-in">
                    <div class="mt-1">
                        ${isCorrect 
                            ? '<i data-lucide="check-circle-2" class="text-green-500 w-8 h-8"></i>' 
                            : '<i data-lucide="alert-circle" class="text-orange-500 w-8 h-8"></i>'}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-lg ${isCorrect ? 'text-green-700' : 'text-orange-700'}">
                            ${isCorrect ? 'Well done!' : 'Let\'s move on'}
                        </h4>
                        <p class="text-slate-600 mt-1">${message}</p>
                        <div class="flex justify-end gap-3 mt-4">
                            <button onclick="handleNext()" class="flex items-center gap-2 bg-slate-900 text-white px-6 py-2 rounded-lg hover:bg-slate-800 transition-colors font-semibold">
                                Next <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function handleNext() {
            if (currentIndex < 9) {
                currentIndex++;
            } else {
                if (currentStage === 1) {
                    currentStage = 2;
                    currentIndex = 0;
                } else {
                    currentStage = 3;
                }
            }
            initStage();
        }

        function updateProgress() {
            const total = 20;
            const current = (currentStage === 2 ? 10 : 0) + (currentStage === 3 ? 10 : currentIndex);
            const percent = (current / total) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function renderFinal() {
            document.getElementById('stage-title').innerHTML = `<i data-lucide="award" class="text-yellow-400"></i> Training Completed!`;
            document.getElementById('stage-desc').innerText = "You have successfully finished the incident reporting workshop.";
            document.getElementById('game-container').innerHTML = `
                <div class="text-center py-10 fade-in">
                    <div class="w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-yellow-200">
                        <i data-lucide="trophy" class="w-12 h-12 text-yellow-500"></i>
                    </div>
                    <h2 class="text-4xl font-extrabold text-slate-900">Total: ${score} Points</h2>
                    <p class="text-slate-500 mt-4 text-lg max-w-sm mx-auto">
                        You've mastered the use of <b>"There was/were"</b> for professional IT incident reporting.
                    </p>
                    <button onclick="resetGame()" class="mt-8 flex items-center gap-2 mx-auto bg-blue-600 text-white px-10 py-4 rounded-xl hover:bg-blue-700 transition-all font-bold shadow-lg shadow-blue-200">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Retake Training
                    </button>
                </div>
            `;
        }

        window.onload = initStage;
    </script>
</body>
</html>
