<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntax Scramble</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-2xl">

<h1 class="text-2xl font-bold mb-4">Syntax Scramble</h1>

<p class="mb-2 text-gray-600">The Client's Answer:</p>
<p id="client" class="bg-blue-100 p-3 rounded mb-4"></p>

<div id="selected" class="min-h-[60px] border p-3 rounded mb-4"></div>

<div id="words" class="flex flex-wrap gap-2 mb-4"></div>

<div class="flex gap-2">
<button onclick="check()" class="bg-blue-600 text-white px-4 py-2 rounded">Check</button>
<button onclick="reset()" class="bg-gray-300 px-4 py-2 rounded">Reset</button>
</div>

<p id="result" class="mt-4 font-bold"></p>

</div>

<script>

const exercises = [
{
client: "Yes, I cook every day.",
correct: ["Do","you","cook","every","day","?"]
},
{
client: "She works in the office.",
correct: ["Where","does","she","work","?"]
}
];

let index = 0;
let selected = [];
let available = [];

function loadExercise() {
    const ex = exercises[index];
    document.getElementById("client").innerText = ex.client;

    selected = [];
    available = [...ex.correct].sort(() => Math.random() - 0.5);

    render();
}

function render() {
    const selectedDiv = document.getElementById("selected");
    const wordsDiv = document.getElementById("words");

    selectedDiv.innerHTML = "";
    wordsDiv.innerHTML = "";

    selected.forEach((w, i) => {
        const btn = document.createElement("button");
        btn.innerText = w;
        btn.className = "bg-blue-500 text-white px-3 py-1 rounded";
        btn.onclick = () => {
            available.push(w);
            selected.splice(i,1);
            render();
        };
        selectedDiv.appendChild(btn);
    });

    available.forEach((w, i) => {
        const btn = document.createElement("button");
        btn.innerText = w;
        btn.className = "bg-gray-200 px-3 py-1 rounded";
        btn.onclick = () => {
            selected.push(w);
            available.splice(i,1);
            render();
        };
        wordsDiv.appendChild(btn);
    });
}

function check() {
    const correct = exercises[index].correct.join(" ");
    const user = selected.join(" ");

    if (user === correct) {
        document.getElementById("result").innerText = "✅ Correct!";
    } else {
        document.getElementById("result").innerText = "❌ Try again";
    }
}

function reset() {
    loadExercise();
}

loadExercise();

</script>

</body>
</html>
