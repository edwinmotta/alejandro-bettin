<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Term Recall</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom animations */
    @keyframes slide-in {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-in {
      animation: slide-in 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- SVGs for Icons (Replacing lucide-react for standalone HTML) ---
    const IconTerminal = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>;
    const IconSend = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
    const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconXCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
    const IconRotate = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>;
    const IconAward = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
    const IconArrowRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
    const IconLightbulb = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><line x1="9" y1="18" x2="15" y2="18"></line><line x1="10" y1="22" x2="14" y2="22"></line></svg>;

    // --- DATA ---
    const CHALLENGES = [
      // Block 1: DevOps & Git (Verbs & Nouns)
      { id: 1, category: "Version Control", term: "branch", hint: "b_ _ _ _h", definition: "The process or area where you create a separate copy of the code to work on a new feature without breaking the main project." },
      { id: 2, category: "Version Control", term: "commit", hint: "c_ _ _ _t", definition: "The action of permanently saving your local changes with a descriptive message explaining what you did." },
      { id: 3, category: "Version Control", term: "merge", hint: "m_ _ _e", definition: "The process of integrating or joining the changes from your working branch into the main branch (usually main or master)." },
      { id: 4, category: "DevOps", term: "deployment", hint: "d_ _ _ _ _ _ _ _t", definition: "The final step where the software is pushed or sent from a testing environment to the actual production servers." },
      { id: 5, category: "DevOps", term: "build", hint: "b_ _ _d", definition: "The automated process of compiling the source code and packaging it into an executable format before releasing it." },
      { id: 6, category: "DevOps", term: "environment", hint: "e_ _ _ _ _ _ _ _ _t", definition: "The specific space or server where the application runs (e.g., staging, testing, or production)." },
      
      // Block 2: Architecture & Data
      { id: 7, category: "Architecture", term: "microservice", hint: "m_ _ _ _ _ _ _ _ _e", definition: "An architectural style where the application is not one giant block, but is divided into small, independent functional services." },
      { id: 8, category: "Architecture", term: "repository", hint: "r_ _ _ _ _ _ _ _y", definition: "The central place where all a project's source code is stored, usually hosted in the cloud like GitHub or GitLab." },
      { id: 9, category: "Database", term: "query", hint: "q_ _ _y", definition: "A specific written request or instruction (usually in SQL) to extract exact information from a database." },
      { id: 10, category: "API", term: "payload", hint: "p_ _ _ _ _d", definition: "The actual block of information or data in JSON format that travels inside the body of a POST or PUT request to an API." },
      { id: 11, category: "API", term: "parse", hint: "p_ _ _e", definition: "The verb describing the action of converting plain JSON text into a manipulable object in JavaScript or another language." },
      { id: 12, category: "Security", term: "token", hint: "t_ _ _n", definition: "The encrypted piece of information a user receives after logging in, which is used to prove their identity in future requests." },

      // Block 3: Coding Actions & Troubleshooting
      { id: 13, category: "Coding Logic", term: "refactor", hint: "r_ _ _ _ _ _r", definition: "The action of cleaning, reorganizing, and improving the existing code structure without changing what the program does externally." },
      { id: 14, category: "Troubleshooting", term: "debug", hint: "d_ _ _g", definition: "The step-by-step process of finding, investigating, and fixing errors or bugs within an application's code." },
      { id: 15, category: "Testing", term: "assertion", hint: "a_ _ _ _ _ _ _n", definition: "In unit testing, it is the statement that evaluates whether the result of a function exactly matches the expected outcome." },
      { id: 16, category: "Performance", term: "latency", hint: "l_ _ _ _ _y", definition: "The delay or waiting time a request takes from when the user clicks until the server successfully responds." },
      { id: 17, category: "Performance", term: "bottleneck", hint: "b_ _ _ _ _ _ _ _k", definition: "The slowest point in the system (like a slow database query) that limits the speed and overall performance of the entire application." },
      { id: 18, category: "Frontend", term: "render", hint: "r_ _ _ _r", definition: "The process the browser or a framework like React performs to process the code and visually draw the components on the screen." },

      // Block 4: General Concepts
      { id: 19, category: "Management", term: "requirement", hint: "r_ _ _ _ _ _ _ _ _t", definition: "A business condition, feature, or need that a software product must strictly fulfill." },
      { id: 20, category: "Security", term: "vulnerability", hint: "v_ _ _ _ _ _ _ _ _ _ _y", definition: "A weak point or flaw in the code that an attacker or hacker could potentially exploit to compromise the system." },
      { id: 21, category: "Observability", term: "dashboard", hint: "d_ _ _ _ _ _ _d", definition: "A graphical UI that displays performance metrics, errors, and system alerts on a single visual screen." },
      { id: 22, category: "Coding Logic", term: "loop", hint: "l_ _p", definition: "A control structure (like 'for' or 'while') that allows you to execute the exact same block of code multiple times." },
      { id: 23, category: "Coding Logic", term: "iterate", hint: "i_ _ _ _ _e", definition: "The action of going through the elements inside a list or data collection one by one." },
      { id: 24, category: "Coding Logic", term: "assign", hint: "a_ _ _ _n", definition: "The action of saving or storing a specific value inside a memory space or variable." },
      { id: 25, category: "Coding Logic", term: "variable", hint: "v_ _ _ _ _ _e", definition: "A named memory container used to store data that can change during the program's execution." },
      { id: 26, category: "Coding Logic", term: "array", hint: "a_ _ _y", definition: "A data structure used to store multiple values or elements under a single variable name, usually in the form of a list." },
      { id: 27, category: "Coding Logic", term: "function", hint: "f_ _ _ _ _ _n", definition: "A reusable block of code designed to perform a specific task only when it is called or invoked." },
      { id: 28, category: "Data", term: "map", hint: "m_p", definition: "A common array method that consists of transforming each element of a list, creating a brand new modified list." },
      { id: 29, category: "UI Interaction", term: "bind", hint: "b_ _d", definition: "The action of linking or connecting a UI event (like a click) to the specific function that should be executed." },
      { id: 30, category: "Troubleshooting", term: "log", hint: "l_g", definition: "The written record (or the action of recording) events, errors, and important information that occurs while the application is running." }
    ];

    // Get 10 random questions
    const getRandomQuestions = (num = 10) => {
      const shuffled = [...CHALLENGES].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, num);
    };

    function App() {
      const [sessionQuestions, setSessionQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userInput, setUserInput] = useState('');
      const [status, setStatus] = useState('typing'); // typing, correct, incorrect, finished
      const [score, setScore] = useState(0);
      const [showHint, setShowHint] = useState(false);
      
      const inputRef = useRef(null);

      // Initialize
      useEffect(() => {
        setSessionQuestions(getRandomQuestions(10));
      }, []);

      // Autofocus
      useEffect(() => {
        if (status === 'typing' && inputRef.current) {
          inputRef.current.focus();
        }
      }, [status, currentIndex]);

      const currentChallenge = sessionQuestions[currentIndex];

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!userInput.trim() || status !== 'typing') return;

        const sanitizedInput = userInput.trim().toLowerCase();
        const isCorrect = sanitizedInput === currentChallenge.term.toLowerCase();

        if (isCorrect) {
          setScore(prev => prev + 1);
          setStatus('correct');
        } else {
          setStatus('incorrect');
        }
      };

      const handleNext = () => {
        if (currentIndex + 1 < sessionQuestions.length) {
          setCurrentIndex(prev => prev + 1);
          setUserInput('');
          setStatus('typing');
          setShowHint(false);
        } else {
          setStatus('finished');
        }
      };

      const restartQuiz = () => {
        setSessionQuestions(getRandomQuestions(10));
        setCurrentIndex(0);
        setScore(0);
        setUserInput('');
        setStatus('typing');
        setShowHint(false);
      };

      if (sessionQuestions.length === 0) return <div className="min-h-screen bg-slate-950 flex items-center justify-center font-mono text-slate-400"><p>Booting console...</p></div>;

      // --- RESULTS ---
      if (status === 'finished') {
        const percentage = (score / sessionQuestions.length) * 100;
        let message = "Keep practicing. Review the vocabulary list and try again.";
        let colorClass = "text-rose-400";
        if (percentage >= 90) { message = "Outstanding! Perfect technical accuracy."; colorClass = "text-emerald-400"; }
        else if (percentage >= 70) { message = "Great job! Good level of technical recall."; colorClass = "text-amber-400"; }

        return (
          <div className="min-h-screen font-mono flex items-center justify-center p-4">
            <div className="bg-slate-900 border border-slate-700 p-8 rounded-lg max-w-lg w-full shadow-2xl">
              <div className="flex justify-center mb-6">
                <IconAward className={`w-20 h-20 ${colorClass}`} />
              </div>
              <h2 className="text-2xl text-center text-white font-bold mb-2">Evaluation Completed</h2>
              <p className="text-slate-400 text-center mb-8">{message}</p>
              
              <div className="bg-slate-950 rounded p-6 mb-8 text-center border border-slate-800">
                <span className="text-slate-500 text-sm block mb-2 uppercase tracking-wider">Correct Terms</span>
                <span className={`text-6xl font-black ${colorClass}`}>{score}</span>
                <span className="text-2xl text-slate-600"> / {sessionQuestions.length}</span>
              </div>

              <button
                onClick={restartQuiz}
                className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded flex items-center justify-center gap-2 transition-colors"
              >
                <IconRotate className="w-5 h-5" />
                Start New Random Session
              </button>
            </div>
          </div>
        );
      }

      // --- MAIN EXAM ---
      return (
        <div className="min-h-screen font-mono flex flex-col items-center py-12 px-4 md:px-8">
          
          <div className="w-full max-w-3xl mb-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <IconTerminal className="w-8 h-8 text-emerald-500" />
              <div>
                <h1 className="text-xl font-bold text-slate-200">Tech Vocab Console</h1>
                <p className="text-xs text-emerald-500/70">ACTIVE_MODE: ACTIVE_RECALL</p>
              </div>
            </div>
            <div className="flex gap-4 text-sm bg-slate-900 p-2 rounded border border-slate-800">
              <div className="px-3 py-1 border-r border-slate-700 text-slate-400">
                Term: <span className="text-white font-bold">{currentIndex + 1}/{sessionQuestions.length}</span>
              </div>
              <div className="px-3 py-1 text-slate-400">
                Score: <span className="text-emerald-400 font-bold">{score}</span>
              </div>
            </div>
          </div>

          <div className="w-full max-w-3xl bg-slate-900 border border-slate-700 rounded-lg shadow-2xl overflow-hidden flex flex-col">
            
            <div className="bg-slate-800 px-4 py-2 border-b border-slate-700 flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-rose-500"></div>
              <div className="w-3 h-3 rounded-full bg-amber-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
              <span className="ml-4 text-xs text-slate-400 font-sans tracking-widest uppercase">bash - term-recall</span>
            </div>

            <div className="p-6 md:p-10 flex-grow">
              
              <div className="mb-8">
                <span className="inline-block bg-slate-800 text-slate-400 px-2 py-1 text-xs rounded mb-4">
                  Category: {currentChallenge.category}
                </span>
                <p className="text-lg md:text-xl text-slate-300 leading-relaxed border-l-4 border-emerald-500 pl-4 py-1">
                  "{currentChallenge.definition}"
                </p>
              </div>

              <form onSubmit={handleSubmit} className="relative mt-8">
                <div className="flex items-center bg-slate-950 border-2 border-slate-700 rounded-md focus-within:border-emerald-500 transition-colors p-2">
                  <span className="text-emerald-500 px-3 font-bold">{'>'}</span>
                  <input
                    ref={inputRef}
                    type="text"
                    value={userInput}
                    onChange={(e) => setUserInput(e.target.value)}
                    disabled={status !== 'typing'}
                    placeholder="Type the technical term..."
                    className="w-full bg-transparent text-white p-2 outline-none font-bold text-lg disabled:opacity-50"
                    autoComplete="off"
                    spellCheck="false"
                  />
                  {status === 'typing' && (
                    <button 
                      type="submit"
                      disabled={!userInput.trim()}
                      className="bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-800 text-white p-2 rounded transition-colors"
                    >
                      <IconSend className="w-5 h-5" />
                    </button>
                  )}
                </div>
              </form>

              <div className="mt-6 min-h-[100px]">
                {status === 'typing' && (
                  <div className="flex justify-between items-center text-sm">
                    <span className="text-slate-500 italic">Press Enter to submit</span>
                    <button 
                      type="button"
                      onClick={() => setShowHint(true)}
                      className={`flex items-center gap-1 text-amber-500 hover:text-amber-400 transition-opacity ${showHint ? 'opacity-0 cursor-default' : 'opacity-100'}`}
                    >
                      <IconLightbulb className="w-4 h-4" /> Need a hint?
                    </button>
                  </div>
                )}

                {status === 'typing' && showHint && (
                   <div className="bg-amber-950/30 border border-amber-900/50 p-3 rounded text-amber-400 text-sm flex items-center gap-2 mt-2 animate-slide-in">
                     <IconLightbulb className="w-4 h-4" /> Hint: The word looks like this <strong>{currentChallenge.hint}</strong>
                   </div>
                )}

                {status === 'correct' && (
                  <div className="bg-emerald-950/50 border border-emerald-900/50 p-4 rounded-lg flex flex-col md:flex-row items-start md:items-center justify-between gap-4 animate-slide-in">
                    <div className="flex items-center gap-3">
                      <IconCheckCircle className="w-6 h-6 text-emerald-500 flex-shrink-0" />
                      <div>
                        <h3 className="text-emerald-400 font-bold">Correct Answer!</h3>
                        <p className="text-slate-400 text-sm">The term is <span className="text-emerald-300 font-bold uppercase">{currentChallenge.term}</span></p>
                      </div>
                    </div>
                    <button onClick={handleNext} autoFocus className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded font-bold flex items-center justify-center gap-2">
                      Next <IconArrowRight className="w-4 h-4" />
                    </button>
                  </div>
                )}

                {status === 'incorrect' && (
                  <div className="bg-rose-950/50 border border-rose-900/50 p-4 rounded-lg flex flex-col md:flex-row items-start md:items-center justify-between gap-4 animate-slide-in">
                    <div className="flex items-center gap-3">
                      <IconXCircle className="w-6 h-6 text-rose-500 flex-shrink-0" />
                      <div>
                        <h3 className="text-rose-400 font-bold">Incorrect Answer</h3>
                        <p className="text-slate-400 text-sm">You typed: <span className="line-through">{userInput}</span>. The correct term was <span className="text-emerald-400 font-bold uppercase">{currentChallenge.term}</span></p>
                      </div>
                    </div>
                    <button onClick={handleNext} autoFocus className="w-full md:w-auto bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded font-bold flex items-center justify-center gap-2 border border-slate-600">
                      Continue <IconArrowRight className="w-4 h-4" />
                    </button>
                  </div>
                )}
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
